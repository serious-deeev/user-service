grpc:
  server:
    port: ${USER_SERVICE_GRPC_PORT}

spring:
  application:
    name: user-service
  profiles:
    active: ${USER_SERVICE_PROFILE}

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      driver-class-name: "org.postgresql.Driver"

  jpa:
    generate-ddl: false
    properties:
      hibernate:
        default_schema: "user_post_storage"
